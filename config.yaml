server:
  port: 8080

log:
  level: "info"
  filename: "logs/apigateway.log"
  max_size: 10
  max_backups: 5
  max_age: 30
  compress: false

proxy:
  max_idle_conns: 100
  max_idle_conns_per_host: 10
  idle_conn_timeout: 90
  response_timeout: 30

etcd:
  endpoints:
    - "localhost:2379"
  timeout: 5
  prefix: "/services"

jwt:
  secret: "your-secret-key-change-in-production"
  expiration: 86400
  white_list:
    - "/health"
    - "/api/public/*"
  admin_user: "admin"
  admin_pass: "admin123"

redis:
  addr: "localhost:6379"
  password: ""
  db: 0

routes:
  - path: "/api/users"
    method: "GET"
    match_type: "exact"
    balancer: "round_robin"
    rate_limit:
      type: "token_bucket"
      limit: 100
      burst: 200
    circuit_breaker:
      error_threshold: 0.5
      min_requests: 10
      window_seconds: 60
      recovery_time: 30
    upstreams:
      - address: "http://localhost:9001"
        weight: 100

  - path: "/api/v1/user"
    method: "GET"
    match_type: "exact"
    balancer: "weighted_round_robin"
    rate_limit:
      type: "token_bucket"
      limit: 100
      burst: 200
    upstreams:
      - address: "http://localhost:8081"
        weight: 100

  - path: "/api/files/*"
    method: "GET"
    match_type: "prefix"
    balancer: "random"
    upstreams:
      - address: "http://localhost:9002"
        weight: 100

  - path: "/api/users/{id:[0-9]+}"
    method: "GET"
    match_type: "regex"
    balancer: "consistent_hash"
    hash_key: "param:id"
    rate_limit:
      type: "redis"
      limit: 50
      burst: 100
    circuit_breaker:
      error_threshold: 0.3
      min_requests: 20
      window_seconds: 30
      recovery_time: 15
    upstreams:
      - address: "http://localhost:9003"
        weight: 100
